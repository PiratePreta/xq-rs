# Release pipeline — publishes the xquad toolchain to crates.io and
# PyPI on every tag of the form `v<digit>...`.
#
# Required protected CI variables (set once in project settings →
# CI/CD → Variables; both are masked + protected):
#
#   CARGO_REGISTRY_TOKEN  crates.io API token for ops@postquant.xyz
#                         scoped to xqvm + xqasm + xqcli (publish-new
#                         + publish-update).
#
#   PYPI_TOKEN            PyPI API token for ops@postquant.xyz scoped to
#                         xqffi + xqcp + xqsa + xqvm_py + xquad. First
#                         release needs an account-wide token because
#                         per-project tokens require the project to
#                         already exist on PyPI.
#
# See RELEASING.md for the full tag-cut checklist.

# ---------------------------------------------------------------------------
# Shared rules
# ---------------------------------------------------------------------------

# Run only on pushed tags like v0.1.0, v0.0.1-rc1, v1.2.3, …
.on-release-tag: &on-release-tag
    rules:
        - if: $CI_COMMIT_TAG =~ /^v\d/

# Same trigger as `.on-release-tag`, but the job sits as a manual
# "play" button until a maintainer clicks it (QUI-495). Used by the
# publish jobs so a tag push fires validate + GitLab Release notes
# automatically while the irreversible registry uploads (cargo
# publish, twine upload) wait for explicit confirmation. The tag is
# effectively a "draft release" until the click happens.
#
# `allow_failure: true` keeps the pipeline reported as green while
# the manual job sits unclicked -- otherwise an unclicked draft tag
# would show as a failed pipeline forever.
.on-release-tag-manual: &on-release-tag-manual
    rules:
        - if: $CI_COMMIT_TAG =~ /^v\d/
          when: manual
          allow_failure: true

# Run on every MR and push; never on the release tag (that's what the
# actual release jobs are for). These dry-runs prove the release path
# works without publishing.
.on-pr-or-push: &on-pr-or-push
    rules:
        - if: $CI_COMMIT_TAG =~ /^v\d/
          when: never
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        - if: $CI_COMMIT_BRANCH
          when: on_success

# uv + maturin + twine for the Python publish jobs. We stay on
# rust:latest (the workspace default) so cargo is available for
# maturin's cdylib build; uv provides the wheel builder for the
# pure-Python peers.
.setup-python-publish: &setup-python-publish
    - apt-get update && apt-get install -y --no-install-recommends python3 python3-pip python3-venv curl ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="${HOME}/.local/bin:${PATH}"
    - uv --version
    - uv tool install maturin --with-requirements /dev/null
    - uv tool install twine
    - export PATH="${HOME}/.local/share/uv/tools/maturin/bin:${HOME}/.local/share/uv/tools/twine/bin:${PATH}"
    - maturin --version
    - twine --version

# ---------------------------------------------------------------------------
# Release jobs (tag-triggered)
# ---------------------------------------------------------------------------

# Validate-then-publish gate (QUI-473). Runs against the tagged commit
# on the real runner before anything touches a registry. Catches
# packaging regressions -- missing license file, broken maturin
# config, metadata drift in xqasm/xqcli not visible to the MR-time
# single-crate dry-run, pyproject manifest issues -- without leaving
# half-published artefacts behind on a partial failure.
#
# Crate dry-run note: xqvm gets a full `cargo publish --dry-run`
# (verify build included). xqasm/xqcli use `--no-verify` because
# their workspace dep on xqvm resolves to a version that won't exist
# on crates.io until `release:publish-crates` runs; --no-verify skips
# the build-from-packaged-source step but still validates manifest
# metadata, license file, and package contents -- the actual things
# this gate exists to catch.
release:validate:
    stage: release
    <<: *on-release-tag
    before_script:
        - *setup-python-publish
    script:
        - cargo --version
        - cargo publish --dry-run --locked -p xqvm
        - cargo publish --dry-run --locked --no-verify -p xqasm
        - cargo publish --dry-run --locked --no-verify -p xqcli
        # See scripts/python-dists.sh for the package list and the
        # build/check sequence (shared with release:dry-run:pypi).
        - bash scripts/python-dists.sh check

# Publish the three Rust crates to crates.io in topological dependency
# order: xqvm (no deps) → xqasm (depends on xqvm) → xqcli (depends on
# both). The `xqffi` crate keeps `publish = false` — it's a pyo3
# cdylib consumed via the PyPI wheel, not a crates.io dependency.
release:publish-crates:
    stage: release
    needs:
        - release:validate
    <<: *on-release-tag-manual
    script:
        - cargo --version
        - cargo publish --locked -p xqvm --token "${CARGO_REGISTRY_TOKEN}"
        - cargo publish --locked -p xqasm --token "${CARGO_REGISTRY_TOKEN}"
        - cargo publish --locked -p xqcli --token "${CARGO_REGISTRY_TOKEN}"

# Publish the Python distributions to PyPI. Order matters: xquad is
# the umbrella meta-package and depends on the peers, so it must land
# *after* them or `pip install xquad` cannot resolve its deps.
#
#   1. xqffi            (pyo3 cdylib — maturin builds manylinux wheels)
#   2. xqvm_py          (pure-Python reference VM)
#   3. xqcp             (DSL)
#   4. xqsa             (solver adapters)
#   5. xquad            (umbrella — depends on 1-4)
#
# maturin publish uploads wheels for the current runner's platform
# tag. The full matrix (linux-x86_64 + linux-aarch64 + macos-arm64 +
# windows-x86_64) requires a multi-runner fan-out; for v0.1.0 we ship
# linux-x86_64 only and track the matrix as a RELEASING.md follow-up.
release:publish-pypi:
    stage: release
    needs:
        - release:validate
        - release:publish-crates
    <<: *on-release-tag-manual
    before_script:
        - *setup-python-publish
    script:
        # See scripts/python-dists.sh for the package list and the
        # build/upload sequence.
        - bash scripts/python-dists.sh publish

# Generate GitLab Release notes from the conventional-commit history
# via git-cliff (cliff.toml). Runs on every release tag and uploads
# `release-notes.md` as an artefact for `release:notes` to consume.
#
# `STRIP=all` drops the cliff.toml header/footer so the published
# notes contain only the tag's own section -- the GitLab release page
# already supplies its own framing (tag name, date, etc.).
#
# CHANGELOG.md is gitignored; the in-tree source of truth for release
# notes is `cliff.toml` plus the conventional-commit log.
#
# `GIT_DEPTH: 0` overrides GitLab's default shallow clone -- git-cliff
# walks the full commit history back through tag boundaries to render
# release sections, so a shallow clone produces silently truncated
# notes. The same override is set on `lint:changelog`.
release:changelog:
    stage: release
    # Decoupled from publish-pypi (QUI-495) so the GitLab Release page
    # goes up automatically on tag push, regardless of whether the
    # manual publish jobs are eventually clicked. The page describes
    # the release; whether artefacts are on crates.io / PyPI yet is
    # orthogonal.
    needs:
        - release:validate
    <<: *on-release-tag
    variables:
        GIT_DEPTH: 0
    before_script:
        - export PATH="${CARGO_HOME}/bin:${PATH}"
        # Install only git-cliff (version pinned in
        # scripts/cargo-tools.lock); the rest of the cargo toolchain
        # isn't needed to render the changelog.
        - bash scripts/install-cargo-tools.sh --only git-cliff
    script:
        - make changelog-release VERSION="${CI_COMMIT_TAG}" STRIP=all OUTPUT=release-notes.md
        - cat release-notes.md
    artifacts:
        paths:
            - release-notes.md
        expire_in: 30 days

# Create the GitLab Release page for the tag with the git-cliff-
# generated notes as the description. Uses GitLab's `release:`
# keyword (declarative) which talks to the project API via the
# CI_JOB_TOKEN -- no extra secrets needed.
release:notes:
    stage: release
    image: registry.gitlab.com/gitlab-org/release-cli:latest
    # Alpine-based release-cli image -- the rust default cache paths
    # are irrelevant here.
    cache: []
    needs:
        - job: release:changelog
          artifacts: true
    <<: *on-release-tag
    script:
        - echo "Publishing GitLab Release for ${CI_COMMIT_TAG}"
    release:
        tag_name: "${CI_COMMIT_TAG}"
        name: "xquad ${CI_COMMIT_TAG}"
        description: ./release-notes.md

# ---------------------------------------------------------------------------
# Dry-run jobs (MR / push — validate the release path without publishing)
# ---------------------------------------------------------------------------

# `cargo publish --dry-run` validates the packaged crate without
# uploading: Cargo.toml metadata, license files, doc build, dependency
# versions, etc. Running for every MR catches release-blocking
# regressions long before the tag is cut.
#
# Only `xqvm` is dry-run with the full verify build because xqasm +
# xqcli's workspace dependencies resolve against crates.io (where the
# just-bumped xqvm hasn't been pushed yet during a dry-run). The
# tag-time `release:validate` job covers all three crates -- xqvm
# fully, xqasm/xqcli with `--no-verify` -- before any publish runs.
release:dry-run:crates:
    stage: lint
    <<: *on-pr-or-push
    script:
        - cargo --version
        - cargo publish --locked --dry-run -p xqvm

# maturin build + twine check validate that wheels + sdists would
# upload cleanly. No token needed; no network upload.
release:dry-run:pypi:
    stage: lint
    <<: *on-pr-or-push
    before_script:
        - *setup-python-publish
    script:
        # See scripts/python-dists.sh for the package list and the
        # build/check sequence (shared with release:validate).
        - bash scripts/python-dists.sh check
