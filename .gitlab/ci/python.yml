# Python workspace lint + test suite.
#
# The xquad Python tree lives in four packages: xqvm_py (VM reference),
# xqcp (DSL), xqsa (solver adapters), and xqapi (pyo3 bindings). All
# four are managed as a single uv workspace (see root pyproject.toml);
# `uv sync` installs them editable + builds xqapi's cdylib via maturin.

.install-uv: &install-uv
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="${HOME}/.local/bin:${PATH}"
    - uv sync

lint:python:
    stage: lint
    before_script:
        - *install-uv
    script:
        - make lint-python
        - make fmt-check-python

test:python:
    stage: test
    before_script:
        - *install-uv
    script:
        - make test-python
