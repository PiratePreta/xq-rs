# Cross-implementation conformance — opcode table parity + vector
# suite. Each job is parameterised on a single runtime so that a
# Python-side regression cannot mask a Rust-side pass (or vice versa).
#
# * lint:opcode-parity — Rust-side is enforced at compile time by
#   `xqvm/build.rs` (triggered by `cargo build -p xqvm`); the Python
#   side is a separate script because we can't assert against a
#   Python file from Rust's type system.
# * conformance:rust / conformance:python — run the shared
#   `xquad-conformance` crate with the matching feature flag. The
#   python side shells out to `uv run python -m xqvm_py run …` so
#   the venv (editable xqvm_py + maturin-built xqffi) is active.

.install-deps: &install-deps
    - export PATH="${CARGO_HOME}/bin:${PATH}"
    - make deps

.install-uv: &install-uv
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="${HOME}/.local/bin:${PATH}"
    - uv sync

lint:opcode-parity:
    stage: lint
    before_script:
        - *install-deps
        - *install-uv
    script:
        - make opcode-parity

conformance:rust:
    stage: conformance
    before_script:
        - *install-deps
    script:
        - make conformance-rust

conformance:python:
    stage: conformance
    before_script:
        - *install-deps
        - *install-uv
    script:
        - make conformance-python

# End-to-end example-smoke: runs `xqcp DSL -> xqffi.asm -> Vm -> xqsa
# -> decode` against the committed golden.json on both Python and
# Rust interpreters. Re-enabled after QUI-465: the TSP decoder now
# canonicalises tour orientation (lex-min direction) so Rust and
# Python match byte-for-byte across platforms; MaxCut already had
# bit-flip canonicalisation.
conformance:examples:
    stage: conformance
    before_script:
        - *install-deps
        - *install-uv
    script:
        - make example-smoke
