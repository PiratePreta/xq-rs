# Rust linting (formatting, clippy, rustdoc, cargo-deny).
#
# Reuses the workspace's `make` targets so the CI definition and the
# local workflow stay identical. Changing a lint rule means updating the
# Makefile once, not here.

.install-deps: &install-deps
    - export PATH="${CARGO_HOME}/bin:${PATH}"
    - make deps

lint:fmt:
    stage: lint
    before_script:
        - *install-deps
    script:
        # fmt-check-python is intentionally omitted here — it needs `uv`
        # which this job does not install. Python formatting is covered
        # by `lint:python` in .gitlab/ci/python.yml.
        - make fmt-check-rust
        - make fmt-check-taplo

lint:clippy:
    stage: lint
    before_script:
        - *install-deps
    script:
        - make lint-clippy

lint:rustdoc:
    stage: lint
    before_script:
        - *install-deps
    script:
        - make lint-doc

lint:deny:
    stage: lint
    before_script:
        - *install-deps
    script:
        - make lint-deny

# Atomic spec-MR guard — enforces the two-impl development discipline
# documented in docs/xquad-development-workflow.md. VM-semantics MRs
# must touch spec + xqvm + xqvm_py + conformance in the same MR.
# Runs on merge requests only; the guard is about MR shape, not about
# branch-level pushes.
lint:atomic-spec-mr:
    stage: lint
    image: alpine:3
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    before_script:
        - apk add --no-cache bash git
    script:
        - bash scripts/check-atomic-spec-mr.sh "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" HEAD
