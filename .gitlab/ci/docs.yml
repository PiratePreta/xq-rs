# Documentation pipeline — asserts the committed
# docs/bytecode-semantics.md is in sync with conformance/opcodes.yaml,
# then builds the mdbook.

.install-deps: &install-deps
    - export PATH="${CARGO_HOME}/bin:${PATH}"
    - make deps-docs

.install-uv: &install-uv
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="${HOME}/.local/bin:${PATH}"
    - uv sync

docs:build:
    stage: docs
    before_script:
        - *install-deps
        - *install-uv
    script:
        - make docs-check
        - make docs
    artifacts:
        paths:
            - docs/book/build/
