# Pinned cargo-installed tool versions.
#
# One entry per line, formatted as:
#
#   <crate>=<version> [binary]
#
# `crate` is the crates.io name (the argument to `cargo install`);
# `version` is an exact version, no semver ranges; optional `binary`
# overrides the produced executable name when it differs from the
# crate name (e.g. `taplo-cli` ships the `taplo` binary).
#
# Consumed by `scripts/install-cargo-tools.sh` (invoked from
# `Makefile` targets `deps` and `deps-docs`) and by the
# `.cargo/bin/` cache key in `.gitlab-ci.yml`. Bump a version and
# CI rebuilds its cache on the next pipeline; leave alone and CI
# reuses the cached binary.
#
# Upgrade with care: a bump here forces every Rust CI job to
# re-install from source on the first run after the bump. Coordinate
# with infra and pick a quiet window.

taplo-cli=0.10.0 taplo
cargo-deny=0.19.4
cargo-nextest=0.9.130
mdbook=0.5.2
mdbook-mermaid=0.17.0
