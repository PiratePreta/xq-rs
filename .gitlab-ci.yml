default:
    image: rust:latest
    cache:
        key:
            files:
                - Cargo.lock
        paths:
            - .cargo/registry/
            - .cargo/git/
            - target/

variables:
    CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

.add-cargo-bin: &add-cargo-bin
    - export PATH="${CARGO_HOME}/bin:${PATH}"

stages:
    - lint
    - test

# -- Lints ------------------------------------------------------------------

lint:clippy:
    stage: lint
    before_script:
        - rustup component add clippy
    script:
        - cargo clippy --workspace --all-targets --all-features -- -D warnings

# -- Formatting -------------------------------------------------------------

lint:rustfmt:
    stage: lint
    before_script:
        - rustup component add rustfmt
    script:
        - cargo fmt --all -- --check

lint:taplo:
    stage: lint
    before_script:
        - *add-cargo-bin
        - cargo install taplo-cli --locked
    script:
        - taplo lint check
        - taplo fmt --check

# -- Documentation ----------------------------------------------------------

lint:rustdoc:
    stage: lint
    variables:
        RUSTDOCFLAGS: "-D warnings"
    script:
        - cargo doc --workspace --all-features --no-deps

# -- Semantic version check -------------------------------------------------

lint:semver-checks:
    stage: lint
    before_script:
        - cargo install cargo-semver-checks --locked
    script:
        - cargo semver-checks check-release --workspace
    rules:
        - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
        - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/'

# -- License compliance and security ----------------------------------------

lint:deny:
    stage: lint
    before_script:
        - cargo install cargo-deny --locked
    script:
        - cargo deny check

# -- Unit tests -------------------------------------------------------------

test:unit:
    stage: test
    script:
        - cargo test --workspace --all-features --lib --profile ci-test

# -- Integration tests ------------------------------------------------------

test:integration:
    stage: test
    script:
        - cargo test --workspace --all-features --test '*' --profile ci-test

