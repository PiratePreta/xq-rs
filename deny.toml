[licenses]
confidence-threshold = 0.9

allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",  # Public domain equivalent, no restrictions
  "Unlicense",  # Public domain equivalent, no restrictions
]

deny = [
  # AGPL family — network use counts as distribution, forcing you to
  # release your entire application source under AGPL terms.
  "AGPL-1.0-only",
  "AGPL-1.0-or-later",
  "AGPL-3.0-only",
  "AGPL-3.0-or-later",

  # GPL family — any linked code must be released under GPL.
  "GPL-2.0-only",
  "GPL-2.0-or-later",
  "GPL-3.0-only",
  "GPL-3.0-or-later",

  # LGPL is safer than GPL but still imposes dynamic-linking constraints
  # and can be upgraded to GPL-3.0 by the licensee. Ban it unless you
  # have a deliberate exception policy.
  "LGPL-2.0-only",
  "LGPL-2.0-or-later",
  "LGPL-2.1-only",
  "LGPL-2.1-or-later",
  "LGPL-3.0-only",
  "LGPL-3.0-or-later",

  # EUPL-1.1 is copyleft and explicitly compatible with AGPL-3.0,
  # meaning combined works can be relicensed under AGPL terms.
  "EUPL-1.1",

  # OSL is a strong copyleft license with a broad definition of
  # "derivative work" that can encompass dynamic linking.
  "OSL-3.0",

  # SSPL is used by MongoDB and is intentionally designed to be more
  # restrictive than AGPL for service providers.
  "BUSL-1.1",  # Business Source License — not OSI-approved, converts to
  # a copyleft-like license after a defined change date.
]

# Crates whose license cargo-deny cannot detect automatically.
# Run `cargo deny list` to find candidates, then clarify them here.
# [[licenses.clarify]]
# example — uncomment and fill in when cargo deny check reports an unknown:
# name = "ring"
# expression = "MIT AND ISC AND OpenSSL"
# license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true
registries = []
