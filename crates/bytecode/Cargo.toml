[package]
name                 = "aglais-xqvm-bytecode"
description          = "Bytecode for Aglais XQVM"
version              = "0.1.0"
license.workspace    = true
repository.workspace = true
edition              = "2024"

[lints]
workspace = true

[dependencies]
postcard  = { version = "1", features = [ "alloc" ] }
serde     = { version = "1", default-features = false }
thiserror = "2"

[dev-dependencies]
serde_json = "1"
